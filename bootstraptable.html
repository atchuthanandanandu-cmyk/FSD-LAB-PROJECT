<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-3">
  <h2>Basic Table</h2>
  <p>The .table class adds basic styling (light padding and horizontal dividers) to a table:</p>            
  <table border="1"
  bgcolor="cream"
    <thead>
      <tr>
        <th>Firstname</th>
        <th>Lastname</th>
        <th>Email</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>aishu</td>
        <td>navya</td>
        <td>aishu@example.com</td>
      </tr>
      <tr>
        <td>sweety</td>
        <td>geethika</td>
        <td>sweety@example.com</td>
      </tr>
      <tr>
        <td>suni</td>
        <td>sunitha</td>
        <td>suni@example.com</td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>
